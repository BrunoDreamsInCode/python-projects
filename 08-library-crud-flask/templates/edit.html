<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      background-color: #1e1e2f;
      color: #fff;
    }
    .card {
      background-color: #2b2b3b;
      border: none;
      max-width: 500px;
      margin: auto;
      margin-top: 80px;
      padding: 20px;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card h3 {
      font-weight: bold;
    }
    .form-control {
      background-color: #3a3a4b;
      border: 1px solid #555;
      color: #fff;
    }
    .form-control:focus {
      background-color: #3a3a4b;
      color: #fff;
      border-color: #ffc107;
      box-shadow: none;
    }
    .btn-custom {
      min-width: 120px;
    }
  </style>
</head>
<body>
  <div class="card text-center">
    <h3>Edit Book Rating</h3>
    <p><strong>{{ book.title }}</strong></p>
    <p>Current Rating: <strong>{{ book.rating }}</strong></p>

    <form action="" method="POST" class="mt-4">
      <div class="mb-3">
        <label for="new_rating" class="form-label">New Rating</label>
        <input type="number" step="any" class="form-control" id="new_rating" name="new_rating" required>
      </div>

      <div class="d-flex justify-content-between mt-4">
        <button type="submit" class="btn btn-warning btn-custom">
          <i class="bi bi-pencil-square"></i> Update
        </button>
        <a href="{{ url_for('home') }}" class="btn btn-secondary btn-custom">
          <i class="bi bi-arrow-left-circle"></i> Cancel
        </a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
